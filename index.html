<script>
function openAdvice() {

  const newWindow = window.open("", "_blank");

  newWindow.document.write(`
    <html>
    <head>
      <title>Advice for Parents</title>
      <style>
        body {
          font-family: Arial;
          padding: 40px;

          line-height:1.6;
        }
        h1 {color:#A8D5BA;}
      </style>
    </head>

    <body>

    <h1>The Power of Play in Strengthening Bonds</h1>

    <p>
    Playtime is not just a fun activity for children but also a powerful tool for building strong sibling bonds.
    When siblings play together, they learn essential skills such as cooperation, communication, and problem-solving.
    </p>

    <ul>
      <li>Playtime allows siblings to interact in a relaxed setting</li>
      <li>They learn cooperation and teamwork</li>
      <li>Communication skills improve</li>
      <li>Problem-solving develops naturally</li>
    </ul>

    <h2>Creating Shared Memories Through Play</h2>

    <p>
    Playing together creates beautiful memories that last for years.
    Activities like games, dancing, or building things strengthen family unity.
    </p>

    <h2>The Unique Bond of Siblings</h2>

    <p>
    Siblings are often each other’s first friends. Their bond grows through shared experiences
    and helps develop emotional intelligence and social skills.
    </p>

    <h2>The Lasting Benefits of Play</h2>

    <p>
    Simple activities like puzzles, games, or playing together can build a strong,
    lasting bond that benefits children for years.
    </p>

    </body>
    </html>
  `);
}
