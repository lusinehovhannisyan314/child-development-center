<!DOCTYPE html>  
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bright Steps Child Development Center</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin:0;
  font-family:'Segoe UI';
  color:#333;
  background-color:#F9F7F3;
  background-image: radial-gradient(#F2D7A1 1px, transparent 1px);
  background-size: 30px 30px;
}

html {scroll-behavior:smooth;}

header {
  background:#A8D5BA;
  color:white;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
}

nav {
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
}

nav a {
  margin:0 12px;
  color:white;
  text-decoration:none;
  font-weight:500;
}

.lang-btn {
  margin-left:15px;
  padding:6px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

/* HERO */
.hero {
  padding:80px 20px;
  text-align:center;
  background:url('https://images.unsplash.com/photo-1588072432836-e10032774350') center/cover;
  color:white;
}

.hero h2 {
  background:rgba(0,0,0,0.5);
  display:inline-block;
  padding:10px 20px;
  border-radius:10px;
}

.section {
  padding:60px 20px;
  text-align:center;
}

/* SPECIALISTS (UPDATED STYLE) */
.services {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  max-width:1000px;
  margin:auto;
}

/* NEW CARD STYLE (THEME COLOR) */
.card {
  background:linear-gradient(135deg,#A8D5BA,#E8FFF1);
  padding:25px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(168,213,186,0.35);
  color:#2f4f3f;
  font-weight:600;
  transition:0.3s ease;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 15px 30px rgba(168,213,186,0.5);
}

/* Highlight remains stronger */
.card.highlight {
  transform:scale(1.05);
  background:linear-gradient(135deg,#7fc9a6,#dfffee);
  border:2px solid #ffffff;
}

/* CENTER LAST CARD */
.services .center-card {
  grid-column:1 / -1;
  justify-self:center;
  width:260px;
}

/* SLIDER */
.slider {
  max-width:900px;
  margin:40px auto;
  overflow:hidden;
  border-radius:20px;
}

.slides {
  display:flex;
  width:200%;
  animation:scroll 40s linear infinite;
}

.slides img {
  width:25%;
  height:420px;
  object-fit:cover;
}

@keyframes scroll {
  0% {transform:translateX(0);}
  100% {transform:translateX(-50%);}
}

/* ABOUT */
.about-container {
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  gap:40px;
  max-width:1000px;
  margin:auto;
}

.about-text {
  text-align:left;
  line-height:1.7;
}

.about-img img {
  width:75%;
  max-width:320px;
  border-radius:15px;
}

/* FORM */
.form-box {
  max-width:600px;
  margin:auto;
  background:white;
  padding:25px;
  border-radius:15px;
}

input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

.btn {
  background:#A8D5BA;
  color:white;
  padding:12px 20px;
  border:none;
  border-radius:25px;
}

/* FOOTER */
footer {
  background:#A8D5BA;
  color:white;
  text-align:center;
  padding:20px;
}

</style>
</head>

<body>

<header>
  <div style="font-size:22px;font-weight:bold;" 
       data-en="Bright Steps Child Development Center"
       data-am="«Բրայթ Սթեփս» երեխաների զարգացման կենտրոն">
    Bright Steps Child Development Center
  </div>

  <nav>
    <a href="#home" data-en="Home" data-am="Գլխավոր">Home</a>
    <a href="#about" data-en="About Us" data-am="Մեր մասին">About Us</a>
    <a href="#" onclick="openAdvice()" data-en="Advice" data-am="Խորհուրդներ">Advice</a>
    <a href="#booking" data-en="Book" data-am="Ամրագրում">Book</a>
    <button onclick="toggleLang()" class="lang-btn">ARM / ENG</button>
  </nav>
</header>

<!-- HERO -->
<section class="hero" id="home">
  <h2 data-en="Helping Children Grow with Confidence"
      data-am="Օգնում ենք երեխաներին զարգանալ վստահությամբ">
    Helping Children Grow with Confidence
  </h2>
</section>

<!-- SPECIALISTS (UPDATED ONLY THIS PART) -->
<section class="section">
  <h2 data-en="Our Specialists" data-am="Մեր մասնագետները">Our Specialists</h2>

  <div class="services">
    <div class="card" data-en="Speech Therapist" data-am="Խոսքի թերապևտ">Speech Therapist</div>
    <div class="card" data-en="Social Worker" data-am="Սոցիալական աշխատող">Social Worker</div>
    <div class="card highlight" data-en="Art Therapy Specialist" data-am="Արտ թերապիայի մասնագետ">Art Therapy Specialist</div>
    <div class="card" data-en="Social Pedagog" data-am="Սոցիալական մանկավարժ">Social Pedagog</div>

    <!-- CENTERED LAST CARD -->
    <div class="card center-card" data-en="Physical Education Specialist" data-am="Ֆիզկուլտուրայի մասնագետ">
      Physical Education Specialist
    </div>
  </div>
</section>

</body>
</html>
